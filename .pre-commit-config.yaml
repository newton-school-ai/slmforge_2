repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2000"]
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
  - repo: local
    hooks:
      - id: block-internal-data
        name: Block internal NST data paths
        entry: |
          bash -c 'if git diff --cached --name-only | grep -E "^_internal/(?!PROJECT_CONTEXT\.md$)|nst-internal|newton-internal"; then echo "Blocked: internal-data path"; exit 1; fi'
        language: system
        pass_filenames: false
      - id: ascii-only
        name: Enforce ASCII-only in tracked text files
        entry: |
          bash -c 'BAD=$(git diff --cached --name-only --diff-filter=ACM | grep -E "\.(md|py|sh|yml|yaml|toml)$" | xargs -I{} grep -lP "[^\x00-\x7F]" {} 2>/dev/null || true); if [ -n "$BAD" ]; then echo "Non-ASCII chars in: $BAD"; exit 1; fi'
        language: system
        pass_filenames: false
